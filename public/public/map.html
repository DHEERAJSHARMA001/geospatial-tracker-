<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Map — GeoTracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0f1e;
      --panel:    #111827;
      --border:   #1e293b;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    /* ── Layout: sidebar + map ─────────────────────────────── */
    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 8px;
    }

    .sidebar-header h1 {
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Server Status ─────────────────────────────────────── */
    .server-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }
    .dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.4; }
    }

    /* ── Devices List ──────────────────────────────────────── */
    .section-title {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 14px 16px 8px;
    }

    .devices-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
    }

    .device-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .device-card:hover { border-color: var(--accent); transform: translateX(2px); }

    .device-card .color-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }

    .device-card .device-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-left: 6px;
      margin-bottom: 8px;
    }

    .device-card .coords {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-left: 6px;
    }

    .device-card .coord-item .lbl {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .device-card .coord-item .val {
      font-size: 12px;
      font-weight: 700;
    }

    .device-card .ts {
      font-size: 9px;
      color: var(--muted);
      margin-left: 6px;
      margin-top: 8px;
    }

    /* ── Stats ─────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 1px;
      border-top: 1px solid var(--border);
    }

    .stat-cell {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      background: var(--bg);
    }

    .stat-cell:not(:last-child) { border-right: 1px solid var(--border); }

    .stat-cell .num {
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
    }

    .stat-cell .lbl {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Controls ──────────────────────────────────────────── */
    .controls {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn.active { background: rgba(0,229,255,0.1); border-color: var(--accent); color: var(--accent); }

    /* ── Map Area ──────────────────────────────────────────── */
    #map {
      flex: 1;
      height: 100%;
    }

    /* Override Leaflet popups */
    .leaflet-popup-content-wrapper {
      background: #111827 !important;
      color: #e2e8f0 !important;
      border: 1px solid #1e293b !important;
      border-radius: 10px !important;
      font-family: 'Courier New', monospace !important;
      font-size: 12px !important;
    }

    .leaflet-popup-tip { background: #111827 !important; }

    .popup-content .name { font-weight: 700; color: #00e5ff; margin-bottom: 6px; font-size: 14px; }
    .popup-content .row  { display:flex; justify-content:space-between; gap:16px; margin-bottom:3px; }
    .popup-content .lbl  { color: #64748b; }
    .popup-content .val  { font-weight: 700; }

    /* ── Toast Notifications ───────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text);
      animation: slideIn 0.3s ease;
      border-left: 3px solid var(--green);
    }

    .toast.new-device { border-left-color: var(--accent); }

    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Responsive: collapse sidebar on small screens ─────── */
    @media (max-width: 600px) {
      .sidebar { width: 100%; min-width: unset; height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      .layout  { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <div class="badge">LIVE MAP</div>
      <h1>GeoTracker</h1>
      <p>Real-time multi-device tracking</p>
    </div>

    <div class="server-status">
      <div class="dot" id="server-dot"></div>
      <span id="server-status-text">Connecting to server…</span>
    </div>

    <div class="section-title">Active Devices (<span id="device-count">0</span>)</div>

    <div class="devices-list" id="devices-list">
      <div style="color:var(--muted);font-size:11px;padding:10px;text-align:center;line-height:1.7;">
        No devices tracked yet.<br>Open <strong style="color:var(--accent)">sender.html</strong><br>on a mobile device.
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-cell">
        <div class="num" id="total-updates">0</div>
        <div class="lbl">Updates</div>
      </div>
      <div class="stat-cell">
        <div class="num" id="total-devices">0</div>
        <div class="lbl">Devices</div>
      </div>
      <div class="stat-cell">
        <div class="num" id="uptime">0s</div>
        <div class="lbl">Uptime</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn active" id="trail-btn" onclick="toggleTrails()">Trails ON</button>
      <button class="btn" onclick="fitAll()">Fit All</button>
      <button class="btn" onclick="clearOld()">Clear</button>
    </div>

  </aside>

  <!-- ── Map ─────────────────────────────────────────────── -->
  <div id="map"></div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  GeoTracker — Live Map Client
// ═══════════════════════════════════════════════════════════

// ── Config ─────────────────────────────────────────────────
const DEVICE_COLORS = [
  "#00e5ff","#f59e0b","#22c55e","#ef4444",
  "#a855f7","#f97316","#ec4899","#14b8a6",
  "#64748b","#84cc16",
];

const MAX_TRAIL_POINTS = 50; // how many positions to keep per device trail

// ── State ───────────────────────────────────────────────────
let devicesMap = {};          // { deviceId: { marker, polyline, positions[], color, lastUpdate } }
let colorIndex = 0;
let totalUpdates = 0;
let showTrails = true;
let startTime = Date.now();

// ── Init Map ────────────────────────────────────────────────
const map = L.map("map", {
  center: [32.7226, 74.8573], // Jammu, India — adjust to your location
  zoom: 13,
  zoomControl: true,
});

// OpenStreetMap tiles (free, no API key)
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── Socket.io ───────────────────────────────────────────────
const socket = io();

socket.on("connect", () => {
  setServerStatus(true, "Server connected");
  socket.emit("join_map"); // tell server we are a map client → get current positions
});

socket.on("disconnect", () => {
  setServerStatus(false, "Server disconnected");
});

socket.on("location_update", (data) => {
  handleLocationUpdate(data);
});

// ── Handle Incoming Location Data ───────────────────────────
function handleLocationUpdate(data) {
  const { deviceId, latitude, longitude, accuracy, timestamp } = data;
  const latlng = L.latLng(latitude, longitude);

  totalUpdates++;
  document.getElementById("total-updates").textContent = totalUpdates;

  const isNew = !devicesMap[deviceId];

  if (isNew) {
    // Assign color
    const color = DEVICE_COLORS[colorIndex % DEVICE_COLORS.length];
    colorIndex++;

    // Create custom icon
    const icon = makeIcon(color);

    // Create marker
    const marker = L.marker(latlng, { icon })
      .addTo(map)
      .bindPopup(makePopupHTML(data, color));

    // Create trail polyline (empty at first)
    const polyline = L.polyline([], {
      color: color,
      weight: 2.5,
      opacity: 0.6,
      dashArray: "6 4",
    }).addTo(map);

    devicesMap[deviceId] = {
      marker, polyline,
      positions: [latlng],
      color,
      lastUpdate: new Date(timestamp || Date.now()),
      lastData: data,
    };

    showToast(`📍 New device: ${deviceId}`, "new-device");
    updateDeviceCount();
  } else {
    // Update existing device
    const dev = devicesMap[deviceId];
    dev.marker.setLatLng(latlng);
    dev.marker.getPopup().setContent(makePopupHTML(data, dev.color));
    dev.positions.push(latlng);
    dev.lastUpdate = new Date(timestamp || Date.now());
    dev.lastData = data;

    // Keep trail length bounded
    if (dev.positions.length > MAX_TRAIL_POINTS) {
      dev.positions.shift();
    }

    // Update polyline
    if (showTrails) {
      dev.polyline.setLatLngs(dev.positions);
    }
  }

  // Update sidebar card
  updateDeviceCard(deviceId, data);
}

// ── Marker Icon ─────────────────────────────────────────────
function makeIcon(color) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
      <ellipse cx="16" cy="37" rx="6" ry="3" fill="rgba(0,0,0,0.3)"/>
      <path d="M16 0C9.4 0 4 5.4 4 12c0 9 12 28 12 28S28 21 28 12C28 5.4 22.6 0 16 0z"
            fill="${color}" stroke="#fff" stroke-width="1.5"/>
      <circle cx="16" cy="12" r="5" fill="white" opacity="0.9"/>
    </svg>`;
  return L.divIcon({
    html: svg,
    className: "",
    iconSize: [32, 40],
    iconAnchor: [16, 40],
    popupAnchor: [0, -40],
  });
}

// ── Popup HTML ───────────────────────────────────────────────
function makePopupHTML(data, color) {
  const ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : "—";
  const acc = data.accuracy ? data.accuracy.toFixed(1) + " m" : "—";
  return `
    <div class="popup-content">
      <div class="name" style="color:${color}">${data.deviceId}</div>
      <div class="row"><span class="lbl">Latitude</span><span class="val">${parseFloat(data.latitude).toFixed(6)}</span></div>
      <div class="row"><span class="lbl">Longitude</span><span class="val">${parseFloat(data.longitude).toFixed(6)}</span></div>
      <div class="row"><span class="lbl">Accuracy</span><span class="val">${acc}</span></div>
      <div class="row"><span class="lbl">Updated</span><span class="val">${ts}</span></div>
    </div>`;
}

// ── Sidebar Device Card ──────────────────────────────────────
function updateDeviceCard(deviceId, data) {
  const dev = devicesMap[deviceId];
  const id = "card-" + deviceId.replace(/[^a-zA-Z0-9]/g, "_");

  let card = document.getElementById(id);

  if (!card) {
    // Remove "no devices" placeholder
    const placeholder = document.querySelector(".devices-list > div");
    if (placeholder && placeholder.style.textAlign === "center") placeholder.remove();

    card = document.createElement("div");
    card.className = "device-card";
    card.id = id;
    card.onclick = () => {
      map.setView(dev.marker.getLatLng(), 16);
      dev.marker.openPopup();
    };
    document.getElementById("devices-list").appendChild(card);
  }

  const ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : "—";
  const acc = data.accuracy ? data.accuracy.toFixed(0) + " m" : "—";

  card.innerHTML = `
    <div class="color-bar" style="background:${dev.color}"></div>
    <div class="device-name">${deviceId}</div>
    <div class="coords">
      <div class="coord-item">
        <div class="lbl">Lat</div>
        <div class="val" style="color:${dev.color}">${parseFloat(data.latitude).toFixed(5)}</div>
      </div>
      <div class="coord-item">
        <div class="lbl">Lng</div>
        <div class="val" style="color:${dev.color}">${parseFloat(data.longitude).toFixed(5)}</div>
      </div>
    </div>
    <div class="ts">↻ ${ts} · accuracy ${acc}</div>`;
}

// ── Helpers ──────────────────────────────────────────────────
function updateDeviceCount() {
  const count = Object.keys(devicesMap).length;
  document.getElementById("device-count").textContent = count;
  document.getElementById("total-devices").textContent = count;
}

function setServerStatus(online, text) {
  const dot = document.getElementById("server-dot");
  dot.className = "dot" + (online ? " on" : "");
  document.getElementById("server-status-text").textContent = text;
}

function toggleTrails() {
  showTrails = !showTrails;
  const btn = document.getElementById("trail-btn");
  btn.textContent = showTrails ? "Trails ON" : "Trails OFF";
  btn.className = showTrails ? "btn active" : "btn";
  Object.values(devicesMap).forEach((dev) => {
    if (showTrails) dev.polyline.setLatLngs(dev.positions);
    else            dev.polyline.setLatLngs([]);
  });
}

function fitAll() {
  const markers = Object.values(devicesMap).map((d) => d.marker.getLatLng());
  if (markers.length === 0) return;
  if (markers.length === 1) { map.setView(markers[0], 15); return; }
  map.fitBounds(L.latLngBounds(markers), { padding: [40, 40] });
}

function clearOld() {
  // Remove devices not updated in last 60 seconds
  const now = Date.now();
  Object.keys(devicesMap).forEach((id) => {
    const dev = devicesMap[id];
    if (now - dev.lastUpdate.getTime() > 60000) {
      map.removeLayer(dev.marker);
      map.removeLayer(dev.polyline);
      document.getElementById("card-" + id.replace(/[^a-zA-Z0-9]/g, "_"))?.remove();
      delete devicesMap[id];
    }
  });
  updateDeviceCount();
}

function showToast(msg, cls = "") {
  const tc = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = "toast " + cls;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Uptime Counter ───────────────────────────────────────────
setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById("uptime").textContent =
    s < 60 ? s + "s" : Math.floor(s / 60) + "m";
}, 1000);
</script>
</body>
</html>
